services:
  db:
    image: postgres:16-alpine
    container_name: calendar_clone_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calendar
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
