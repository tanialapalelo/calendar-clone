name: CI / Deploy

# Force JavaScript actions to run on Node 24 now to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  migrate:
    name: Run Prisma Migrations (main only)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prisma generate (ensure client exists)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter=api exec prisma generate

      - name: Run prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter=api exec prisma migrate deploy

      - name: Run prisma db seed (if any)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter=api exec prisma db seed || echo "No seed script or seed failed"

      # Note: app deployments (Render/Vercel) should be handled by their integrations/auto-deploys.
      # This job only runs DB migrations to avoid duplicate builds and speed up CI
