# CodeQL — GitHub's static analysis for security & quality issues.
# Free for public repos. Findings show up in the repo's Security tab.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan to catch vulns in dependencies that didn't change with our code
    - cron: '23 4 * * 1' # Mondays at 04:23 UTC

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Security-extended adds extra security rules beyond default
          queries: security-extended

      - name: Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
